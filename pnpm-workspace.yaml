packages:
  - apps/*
  - packages/*
overrides:
  ioredis: 5.10.1
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  # Source-map upload binary. Built so prod source maps can be uploaded to Sentry; the actual
  # upload only runs when SENTRY_AUTH_TOKEN + SENTRY_ORG + SENTRY_PROJECT are set (see next.config).
  '@sentry/cli': true
  argon2: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
