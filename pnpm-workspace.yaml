packages:
  - apps/*
  - packages/*
overrides:
  ioredis: 5.10.1
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  # Source-map upload binary — not built. Upload is opt-in (needs SENTRY_AUTH_TOKEN); the
  # runtime SDK never touches this CLI. Flip to true if/when you want uploaded source maps.
  '@sentry/cli': false
  argon2: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
