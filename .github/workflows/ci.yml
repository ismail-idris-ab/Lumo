name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Prisma client is generated, not committed — needed before typecheck/build.
      - name: Generate Prisma client
        run: pnpm --filter @lumo/api prisma:generate

      # @lumo/shared resolves via its compiled dist (types) — build it before anything typechecks.
      - name: Build shared package
        run: pnpm --filter @lumo/shared build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm --filter @lumo/api test

      # next build degrades gracefully without a live API (server fetches catch + return empty).
      - name: Build
        run: pnpm -r build
